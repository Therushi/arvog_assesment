<div class="max-w-xl mx-auto p-6">
  <h2 class="text-xl font-semibold mb-4">Product Reports</h2>

  <div class="mb-4">
    <label class="mr-4">
      <input type="radio" name="format" value="csv" [checked]="format() === 'csv'" (change)="setFormat('csv')" />
      CSV
    </label>
    <label>
      <input type="radio" name="format" value="xlsx" [checked]="format() === 'xlsx'" (change)="setFormat('xlsx')" />
      XLSX
    </label>
  </div>

  <input
    type="text"
    placeholder="Filter by product/category name (optional)"
    [value]="search()"
    (input)="onSearchChange($any($event.target).value)"
    class="border rounded px-3 py-2 mb-4 w-full"
  />

  <button
    (click)="generate()"
    [disabled]="generating()"
    class="px-4 py-2 bg-blue-600 text-white rounded disabled:opacity-50"
  >
    {{ generating() ? 'Generating…' : 'Generate Report' }}
  </button>

  @if (status(); as s) {
    <div class="mt-6 border rounded p-4">
      <p>Status: <strong>{{ s.state }}</strong></p>
      @if (s.result) {
        <p>Rows: {{ s.result.rowCount }}</p>
        <button (click)="download()" class="mt-2 px-4 py-2 bg-green-600 text-white rounded">
          Download {{ s.result.format.toUpperCase() }}
        </button>
      }
    </div>
  }
</div>
