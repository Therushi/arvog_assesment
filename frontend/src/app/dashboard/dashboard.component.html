<div>
  <mat-tab-group
    animationDuration="150ms"
    class="bg-surface !rounded-2xl !shadow-sm"
    [selectedIndex]="selectedTabIndex()"
    (selectedIndexChange)="selectedTabIndex.set($event)"
  >
    <mat-tab label="Overview">
      <div class="p-6">
        @if (stats(); as s) {
          <div class="space-y-8">
            <section>
              <h2
                class="text-xs font-semibold uppercase tracking-wider text-on-surface-muted mb-3"
              >
                At a glance
              </h2>
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <mat-card
                  class="relative overflow-hidden !rounded-2xl !shadow-sm !border-0 p-5 pl-6"
                >
                  <span
                    class="absolute left-0 top-0 h-full w-1 bg-google-blue"
                  ></span>
                  <div class="flex items-center gap-4">
                    <div
                      class="flex items-center justify-center w-11 h-11 rounded-full bg-blue-50 shrink-0"
                    >
                      <mat-icon class="text-google-blue">inventory_2</mat-icon>
                    </div>
                    <div>
                      <p
                        class="text-xs font-medium uppercase tracking-wide text-on-surface-muted"
                      >
                        Total Products
                      </p>
                      <p class="text-3xl font-semibold text-on-surface">
                        {{ s.totalProducts }}
                      </p>
                    </div>
                  </div>
                </mat-card>
                <mat-card
                  class="relative overflow-hidden !rounded-2xl !shadow-sm !border-0 p-5 pl-6"
                >
                  <span
                    class="absolute left-0 top-0 h-full w-1 bg-google-green"
                  ></span>
                  <div class="flex items-center gap-4">
                    <div
                      class="flex items-center justify-center w-11 h-11 rounded-full bg-green-50 shrink-0"
                    >
                      <mat-icon class="text-google-green">category</mat-icon>
                    </div>
                    <div>
                      <p
                        class="text-xs font-medium uppercase tracking-wide text-on-surface-muted"
                      >
                        Total Categories
                      </p>
                      <p class="text-3xl font-semibold text-on-surface">
                        {{ s.totalCategories }}
                      </p>
                    </div>
                  </div>
                </mat-card>
                <mat-card
                  class="relative overflow-hidden !rounded-2xl !shadow-sm !border-0 p-5 pl-6"
                >
                  <span
                    class="absolute left-0 top-0 h-full w-1 bg-google-yellow"
                  ></span>
                  <div class="flex items-center gap-4">
                    <div
                      class="flex items-center justify-center w-11 h-11 rounded-full bg-yellow-50 shrink-0"
                    >
                      <mat-icon class="text-google-yellow">insights</mat-icon>
                    </div>
                    <div>
                      <p
                        class="text-xs font-medium uppercase tracking-wide text-on-surface-muted"
                      >
                        Avg Products / Category
                      </p>
                      <p class="text-3xl font-semibold text-on-surface">
                        {{ avgProductsPerCategory() }}
                      </p>
                    </div>
                  </div>
                </mat-card>
              </div>
            </section>

            <section>
              <h2
                class="text-xs font-semibold uppercase tracking-wider text-on-surface-muted mb-3"
              >
                Quick actions
              </h2>
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <button
                  type="button"
                  (click)="goToTab(1)"
                  class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-white p-4 text-left hover:border-google-blue hover:shadow-sm transition"
                >
                  <mat-icon class="text-google-blue">inventory_2</mat-icon>
                  <div>
                    <p class="text-sm font-medium text-on-surface">
                      Manage products
                    </p>
                    <p class="text-xs text-on-surface-muted">
                      View, edit and add products
                    </p>
                  </div>
                </button>
                <button
                  type="button"
                  (click)="goToTab(2)"
                  class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-white p-4 text-left hover:border-google-blue hover:shadow-sm transition"
                >
                  <mat-icon class="text-google-blue">upload_file</mat-icon>
                  <div>
                    <p class="text-sm font-medium text-on-surface">
                      Bulk upload
                    </p>
                    <p class="text-xs text-on-surface-muted">
                      Import products from a CSV file
                    </p>
                  </div>
                </button>
                <button
                  type="button"
                  (click)="goToTab(3)"
                  class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-white p-4 text-left hover:border-google-blue hover:shadow-sm transition"
                >
                  <mat-icon class="text-google-blue">summarize</mat-icon>
                  <div>
                    <p class="text-sm font-medium text-on-surface">
                      Generate report
                    </p>
                    <p class="text-xs text-on-surface-muted">
                      Export product or category data
                    </p>
                  </div>
                </button>
              </div>
            </section>
          </div>
        } @else if (loading()) {
          <div class="flex justify-center py-12">
            <mat-spinner diameter="32" />
          </div>
        } @else {
          <p class="text-on-surface-muted text-center py-8">
            No stats available.
          </p>
        }
      </div>
    </mat-tab>

    <mat-tab label="Products">
      <app-product-list />
    </mat-tab>

    <mat-tab label="Upload">
      <app-upload />
    </mat-tab>

    <mat-tab label="Reports">
      <app-reports />
    </mat-tab>
  </mat-tab-group>
</div>
